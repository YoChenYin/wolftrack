name: Daily market data batch

# 排程時間是 UTC，且不會自動跟著美股日光節約時間調整（EST/EDT 差1小時），
# 這裡抓寬鬆一點的時間點，避免剛好卡在收盤資料還沒好的邊界。
on:
  schedule:
    # 美股批次：約當美東 19:00-20:00（EDT: 23:00-00:00 UTC，EST: 00:00-01:00 UTC）
    - cron: "30 23 * * 1-5"
    # 台股每日更新：約當台北時間 17:00（UTC+8，無日光節約）
    - cron: "0 9 * * 1-5"
    # 台股月營收：官方每月10日左右公布上月營收，抓 10-12 號三天當緩衝（免費 GitHub Actions
    # 排程本身就不保證準時，公司申報也可能延遲，重跑同一天資料是安全的 upsert，不會壞掉）
    - cron: "0 9 10-12 * *"
    # YouTube 頻道新影片發現：每天（含週末，頻道週末也發文）約當台北時間 23:30，覆蓋3個頻道
    # 當天典型的發文時間（EBC 21:00、游庭皓 08:30 隔天才追上、Gooaye 不定期）
    - cron: "30 15 * * *"
    # YouTube 逐字稿擷取：discovery之後約1.5小時，讓新影片有機會先被發現
    - cron: "0 17 * * *"
  workflow_dispatch: {}

jobs:
  us-batch:
    if: github.event.schedule == '30 23 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger US daily batch
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/us-batch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  tw-daily:
    if: github.event.schedule == '0 9 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger TW daily update
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/tw-daily" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  tw-revenue:
    if: github.event.schedule == '0 9 10-12 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger TW monthly revenue fetch
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/tw-revenue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  youtube-discovery:
    if: github.event.schedule == '30 15 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger YouTube video discovery
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/youtube-discovery" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  # 這支現在只是觸發，實際抓字幕/跑Whisper轉錄的工作是在Zeabur那個container裡跑
  # （見 src/app/api/cron/youtube-transcribe/route.ts + 根目錄 Dockerfile）——原本
  # 跑在GitHub Actions runner上，但被YouTube的反機器人機制擋下來（cookies、偽裝手機App
  # 用戶端都試過仍被擋），改成在Zeabur上跑之後這裡只是單純觸發+fire-and-forget。
  youtube-transcribe:
    if: github.event.schedule == '0 17 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger YouTube transcript acquisition
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/youtube-transcribe" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
