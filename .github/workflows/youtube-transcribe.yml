name: YouTube transcript acquisition

# 獨立於 daily-batch.yml：這支需要 Python + yt-dlp + ffmpeg + faster-whisper，
# 跟其他 job 單純 curl 觸發完全不同量級，拆開比較清楚。
# 字幕優先（游庭皓頻道有自動字幕，免跑 Whisper）；沒字幕才下載音訊跑本地開源模型
# 語音轉文字（EBC/Gooaye兩個頻道），跑在 GitHub Actions runner 上而不是 Zeabur 正式站
# container，避免拖慢/佔用常駐服務（見 docs 說明，這是使用者明確選擇的方案）。
on:
  schedule:
    # 01:00 台北時間，discovery（23:30跑）之後約1.5小時，讓新影片有機會先被發現
    - cron: "0 17 * * *"
  workflow_dispatch: {}

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache faster-whisper model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: faster-whisper-small-v1

      - name: Install dependencies
        run: pip install yt-dlp faster-whisper requests

      # 不用 `if: secrets.X != ''` 判斷要不要寫這個檔案——secrets在if條件式裡的支援度
      # 不同版本/linter行為不一致，容易出問題。改成一律寫檔（secret沒設定時就是空檔案），
      # 交給Python那邊檢查檔案是否非空再決定要不要帶cookiefile，邏輯簡單很多。
      - name: Write YouTube cookies file
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: echo "$YOUTUBE_COOKIES" > "$RUNNER_TEMP/youtube-cookies.txt"

      # 排查用：確認cookies檔案格式對不對，不印出實際cookie值（domain/name/value那些
      # 敏感欄位），只印檔案大小、行數、開頭那行（應該是"# Netscape HTTP Cookie File"
      # 這種註解，本身不敏感）、以及含youtube.com網域的行數。
      - name: Debug cookies file shape
        run: |
          f="$RUNNER_TEMP/youtube-cookies.txt"
          echo "byte size: $(wc -c < "$f")"
          echo "line count: $(wc -l < "$f")"
          echo "first line: $(head -1 "$f")"
          echo "lines mentioning youtube.com: $(grep -c 'youtube\.com' "$f" || true)"

      # GitHub Actions runner的IP常被YouTube的反機器人機制擋下來（"Sign in to confirm
      # you're not a bot"），需要帶登入過的cookies才能繞過，見docs/progress-status.md裡
      # YOUTUBE_COOKIES secret的設定說明。沒設定這個secret時腳本會跳過cookies直接跑，
      # 遇到bot check多半會失敗。
      - name: Run transcription job
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          YOUTUBE_COOKIES_FILE: ${{ runner.temp }}/youtube-cookies.txt
        run: python scripts/youtube-transcribe.py
